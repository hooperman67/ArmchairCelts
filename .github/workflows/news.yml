name: Update News JSON

on:
  push:
    branches: ["main"]
    paths:
      - 'news.php'
  schedule:
    - cron: '15 6-23/2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run news parser
        run: php news.php

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "Auto-update index.html" || echo "No changes"

      - name: Push changes
        run: git push
