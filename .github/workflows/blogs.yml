name: Update Blogs JSON

on:
  push:
    branches: ["main"]
    paths:
      - 'blogs.php'
  schedule:
    - cron: '10 6-23/3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-blogs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Run blogs parser
        run: php blogs.php

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add blogs.html
          git commit -m "Auto-update blogs.html" || echo "No changes"

      - name: Push changes
        run: |
          git pull --rebase origin main
          git push
